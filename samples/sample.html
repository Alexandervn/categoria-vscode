<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sample Page</title>
    <link rel="stylesheet" href="sample.css" />
  </head>
  <body>
    <header class="site-header" id="top">
      <nav aria-label="Main navigation">
        <a href="/" class="logo">Categoria</a>
        <ul>
          <li><a href="/about">About</a></li>
          <li><a href="/work">Work</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="hero">
        <h1>Hello, <em>world</em></h1>
        <p>A paragraph with <strong>bold</strong> and <a href="#">a link</a>.</p>
        <button class="button button--primary" disabled>Click me</button>
      </section>

      <article data-id="42">
        <h2>Article title</h2>
        <img src="photo.jpg" alt="A photo" width="800" height="600" />
        <figure>
          <pre><code>const x = 1</code></pre>
          <figcaption>Code example</figcaption>
        </figure>
      </article>

      <form method="post" action="/submit">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com" />
        <input type="submit" value="Send" />
      </form>
    </main>

    <script>
      const btn = document.querySelector('.button')
      btn.addEventListener('click', () => console.log('clicked'))
    </script>
  </body>
</html>
